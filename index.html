<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">

    <title>My Map</title>

    <style>
        #map {
            width: 100%;
            height: 500px;
        }
    </style>

</head>

<body>

    <h1>test</h1>
    <div id="map"></div>
    
<script>
function initMap() {

  const location = {
    lat: 25.0330,
    lng: 121.5654
  };

  const map = new google.maps.Map(
    document.getElementById("map"),
    {
      center: location,
      zoom: 15
    }
  );

  new google.maps.Marker({
    position: location,
    map: map,
    title: "我的位置"
  });

}

</script>


<script
src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAWaJ5y00KT2KJ252n8vNBbkgJUDlHs21E&callback=initMap"
async
defer>
</script>


</body>

</html>
